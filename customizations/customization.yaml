source: dhi/eclipse-temurin
tag_definition_id: eclipse-temurin/alpine-3.22/jre-21

destination: demonstrationorg/dhi-temurin

platforms:
  - linux/amd64
  - linux/arm64

# Optional: additional packages and artifacts
# contents:
#   packages:
#     - curl
#     - wget
#   artifacts:
#     - name: busybox:uclibc
#       includes:
#         - bin

accounts:
  runs-as: appuser
  users: 
    - name: nonroot
      uid: 65532
      gid: 65532
    - name: appuser
      uid: 10001
      gid: 10001
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot

environment:
  JAVA_HOME: /opt/java/openjdk/21-jre
  JAVA_VERSION: jre-21.0.9+10
  LANG: en_US.UTF-8
  LANGUAGE: "en_US:en"
  LC_ALL: en_US.UTF-8
  JAVA_OPTS: "-XX:+UseContainerSupport -XX:InitialRAMPercentage=50 -XX:MaxRAMPercentage=80 -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError -Djava.security.egd=file:/dev/./urandom"

# Optional: custom files
# paths:
#   - path: /etc/myconfig
#     contents: |
#       # Your config content here
#     mode: "0644"
#     uid: 1000
#     gid: 1000

labels:
  App: foundry-of-trusts
  GitHub_Pipeline: True

# Optional: annotations (OCI standard keys)
# annotations:
#   org.opencontainers.image.title: Custom hardened image
#   org.opencontainers.image.description: Customized Docker Hardened Image
#   org.opencontainers.image.url: https://github.com/your-org/your-repo
